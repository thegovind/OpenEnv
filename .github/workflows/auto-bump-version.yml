name: Auto-bump version after PyPI release

on:
  release:
    types: [published]

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Extract released version from tag
        id: released
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: release tag must be stable and match vX.Y.Z"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute next dev version
        id: next
        run: |
          VERSION="${{ steps.released.outputs.version }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEXT_PATCH=$((PATCH + 1))
          NEXT_DEV="${MAJOR}.${MINOR}.${NEXT_PATCH}.dev0"
          echo "dev_version=$NEXT_DEV" >> "$GITHUB_OUTPUT"
          echo "branch=bump/${NEXT_DEV}" >> "$GITHUB_OUTPUT"

      - name: Verify pyproject.toml shows the released version
        run: |
          CURRENT=$(python3 -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              d = tomllib.load(f)
          print(d['project']['version'])
          ")
          EXPECTED="${{ steps.released.outputs.version }}"
          if [ "$CURRENT" != "$EXPECTED" ]; then
            echo "ERROR: pyproject.toml is '$CURRENT' but release tag is '$EXPECTED'"
            exit 1
          fi

      - name: Verify release exists on PyPI
        run: |
          VERSION="${{ steps.released.outputs.version }}"
          for attempt in 1 2 3 4 5; do
            if python3 - <<'PY'
          import os
          import urllib.error
          import urllib.request

          version = os.environ["VERSION"]
          url = f"https://pypi.org/pypi/openenv/{version}/json"
          try:
              with urllib.request.urlopen(url, timeout=30) as response:
                  if response.status == 200:
                      raise SystemExit(0)
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise
          raise SystemExit(1)
          PY
            then
              echo "openenv ${VERSION} is available on PyPI"
              exit 0
            fi
            echo "openenv ${VERSION} is not visible on PyPI yet; retrying..."
            sleep 30
          done

          echo "ERROR: openenv ${VERSION} is not available on PyPI; refusing post-release bump"
          exit 1
        env:
          VERSION: ${{ steps.released.outputs.version }}

      - name: Create bump branch and edit pyproject.toml
        env:
          DEV_VERSION: ${{ steps.next.outputs.dev_version }}
          BRANCH: ${{ steps.next.outputs.branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          python3 - <<'PYEOF'
          import re, pathlib, os
          dev_version = os.environ["DEV_VERSION"]
          p = pathlib.Path("pyproject.toml")
          text = p.read_text()
          text = re.sub(
              r'^version = ".*"',
              f'version = "{dev_version}"',
              text, count=1, flags=re.MULTILINE,
          )
          p.write_text(text)
          PYEOF
          git add pyproject.toml
          git commit -m "chore: bump version to ${DEV_VERSION} (post-release)"
          git push origin "$BRANCH"

      - name: Create pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DEV_VERSION="${{ steps.next.outputs.dev_version }}"
          RELEASED="${{ steps.released.outputs.version }}"
          gh pr create \
            --base main \
            --head "${{ steps.next.outputs.branch }}" \
            --title "chore: bump version to ${DEV_VERSION} (post-release)" \
            --body "Automatic post-release bump after ${RELEASED} was published.

          **Change**: \`pyproject.toml\` version \`${RELEASED}\` → \`${DEV_VERSION}\`

          _Generated by \`.github/workflows/auto-bump-version.yml\`_"
